
<!DOCTYPE html>
<html>
<head>
  <title>Shopping Mart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      text-align: center;
      padding-top: 80px;
      margin: 0;
      min-height: 100vh;
    }
    .container {
      background: white;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { 
      color: #333; 
      margin-bottom: 10px;
    }
    p { 
      color: #666;
      font-size: 18px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #5568d3;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 Shopping Mart</h1>
    <p>Welcome to Shopping Mart - Your Online Store</p>
    <p style="font-size: 14px; color: #999;">Frontend is live 🚀</p>
    
    <button onclick="checkBackend()">Check Backend Status</button>
    <button onclick="checkHealth()">Health Check</button>
    
    <div id="result"></div>
  </div>

  <script>
    const API_URL = '/api';
    
    function showResult(message, isSuccess) {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = message;
      resultDiv.className = isSuccess ? 'success' : 'error';
      resultDiv.style.display = 'block';
    }
    
    function checkBackend() {
      showResult('Checking backend...', true);
      
      fetch(API_URL + '/')
        .then(res => res.text())
        .then(data => {
          showResult('✓ Backend Response: ' + data, true);
        })
        .catch(err => {
          showResult('✗ Backend not reachable: ' + err.message, false);
        });
    }
    
    function checkHealth() {
      showResult('Checking health...', true);
      
      fetch(API_URL + '/health')
        .then(res => res.json())
        .then(data => {
          showResult('✓ Health Check: ' + data.message, true);
        })
        .catch(err => {
          showResult('✗ Health check failed: ' + err.message, false);
        });
    }
  </script>
</body>
</html>
